name: Build 8 STORE APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Extract project from zip
        run: |
          ZIP=$(find . -name "*.zip" | head -1)
          if [ -n "$ZIP" ]; then
            echo "Extracting $ZIP"
            unzip -o "$ZIP" -d extracted/
            PUBSPEC=$(find extracted -name "pubspec.yaml" | head -1)
            DIR=$(dirname "$PUBSPEC")
            echo "Found Flutter project at: $DIR"
            cp -r "$DIR"/. ./project/
          else
            mkdir -p project
            cp -r . project/ 2>/dev/null || true
          fi

      - name: Flutter pub get
        run: |
          cd project
          flutter pub get

      - name: Build APK
        run: |
          cd project
          flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: 8store-release-apk
          path: project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
